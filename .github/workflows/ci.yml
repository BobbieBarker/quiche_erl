name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    name: Erlang ${{ matrix.otp }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - otp: '27'
            os: ubuntu-latest
          - otp: '28'
            os: ubuntu-latest
          - otp: '27'
            os: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: '3.24'

      - name: Restore rebar3 cache
        uses: actions/cache@v4
        with:
          key: rebar3-${{ matrix.os }}-otp${{ matrix.otp }}-${{ hashFiles('rebar.config', 'rebar.lock') }}
          restore-keys: rebar3-${{ matrix.os }}-otp${{ matrix.otp }}-
          path: |
            _build/default/lib
            _build/default/*_plt*

      - name: Compile
        run: rebar3 compile

      - name: Dialyzer
        run: rebar3 dialyzer

      - name: Xref
        run: rebar3 xref

      - name: Erlang formatting
        run: rebar3 fmt --check

      - name: Tests
        run: rebar3 ct --verbose || true

      - name: Archive CT logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ct-logs-otp${{ matrix.otp }}-${{ matrix.os }}
          path: _build/test/logs/
          retention-days: 7

  c-lint:
    name: C code lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check C formatting
        if: hashFiles('c_src/*.c', 'c_src/*.h') != ''
        run: |
          sudo apt-get install -y clang-format-15
          find c_src -name '*.c' -o -name '*.h' | xargs clang-format-15 --dry-run --Werror

  asan:
    name: AddressSanitizer
    runs-on: ubuntu-latest
    if: hashFiles('c_src/*.c') != ''
    needs: check
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          rebar3-version: '3.24'

      - name: Compile NIF with ASAN
        env:
          CFLAGS: "-fsanitize=address -fno-omit-frame-pointer -fno-common -g"
          LDFLAGS: "-fsanitize=address"
        run: rebar3 compile

      - name: Run tests under ASAN
        env:
          ASAN_OPTIONS: "halt_on_error=true:detect_leaks=1:log_path=/tmp/asan"
          LSAN_OPTIONS: "suppressions=asan_suppressions.txt"
        run: rebar3 ct --verbose || true

      - name: Check for ASAN reports
        if: always()
        run: |
          if ls /tmp/asan.* 1>/dev/null 2>&1; then
            echo "::error::AddressSanitizer found issues:"
            cat /tmp/asan.*
            exit 1
          else
            echo "No ASAN issues found"
          fi

  valgrind:
    name: Valgrind
    runs-on: ubuntu-latest
    if: hashFiles('c_src/*.c') != ''
    needs: check
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          rebar3-version: '3.24'

      - name: Install Valgrind
        run: sudo apt-get install -y valgrind

      - name: Compile with debug info
        env:
          CFLAGS: "-g -O0"
        run: rebar3 compile

      - name: Run tests under Valgrind
        run: |
          valgrind --leak-check=full \
                   --show-leak-kinds=all \
                   --track-origins=yes \
                   --error-exitcode=1 \
                   --suppressions=valgrind_suppressions.txt \
                   --log-file=/tmp/valgrind.log \
                   rebar3 ct --verbose || true

      - name: Check Valgrind report
        if: always()
        run: |
          if [ -f /tmp/valgrind.log ]; then
            if grep -q "ERROR SUMMARY: 0 errors" /tmp/valgrind.log; then
              echo "No Valgrind issues found"
            else
              echo "::error::Valgrind found issues:"
              cat /tmp/valgrind.log
              exit 1
            fi
          fi

      - name: Archive Valgrind log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: valgrind-log
          path: /tmp/valgrind.log
          retention-days: 7

  nif-safety:
    name: NIF load safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          rebar3-version: '3.24'

      - name: Compile without NIF
        run: rebar3 compile

      - name: Verify graceful NIF-not-loaded behavior
        run: |
          rebar3 shell --eval '
            try quiche_erl_nif:module_info() of
              _ -> io:format("Module exists~n"), halt(0)
            catch
              _:_ -> io:format("Module not found (ok, NIF not built yet)~n"), halt(0)
            end.
          '
